          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[["🍀","幸運",d.lucky,d.luckyN],["👕","穿著",d.wear,d.wearN],["🚫","避免",d.avoid,d.avoidN]].map(([ic,lb,hex,name])=>(
              <div key={lb} style={{ display:"flex", alignItems:"center", gap:4, background:"#f5f5f4", borderRadius:6, padding:"4px 7px" }}>
                <span style={{ fontSize:10 }}>{ic}</span>
                <Dot hex={hex}/>
                <span style={{ fontSize:10, color:"#57534e", fontWeight:500 }}>{name}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        <div style={{ fontSize:11.5, color:s.badge, background:s.bg, borderRadius:8, padding:"7px 10px", lineHeight:1.55, borderLeft:`3px solid ${s.border}` }}>
          ⚠️ <strong>注意：</strong>{d.warn}
        </div>
        <div style={{ fontSize:11.5, color:"#374151", background:"#f0fdf4", borderRadius:8, padding:"7px 10px", lineHeight:1.55, borderLeft:"3px solid #22c55e" }}>
          💡 <strong>建議：</strong>{d.tip}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [person, setPerson] = useState("ding");
  const now = new Date();
  const todayStr = (now.getMonth()+1) + "/" + now.getDate();
  const [wk, setWk] = useState(1);
  const p = PEOPLE[person];
  const weekCfg = WEEKS[wk];
  const weekData = p.data.slice(...weekCfg.slice);
  const best = [...weekData].sort((a,b) => b.score - a.score)[0];
  const gridDays = weekCfg.partial ? weekData : weekData.slice(0,6);
  const cols = weekCfg.partial ? weekData.length : 3;

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column",
      background:p.bodyBg, maxWidth:430, margin:"0 auto", overflow:"hidden",
      transition:"background .3s" }}>

      {/* Person switcher */}
      <div style={{ background:p.headerBg, padding:"10px 16px 0", flexShrink:0, transition:"background .3s" }}>
        <div style={{ display:"flex", background:"rgba(255,255,255,0.1)", borderRadius:10, padding:3, marginBottom:10 }}>
          {Object.entries(PEOPLE).map(([key, val])=>(
            <button key={key} onClick={()=>{ setPerson(key); setWk(1); }} style={{
              flex:1, padding:"8px 0", borderRadius:8,
              background: person===key ? "rgba(255,255,255,0.2)" : "transparent",
              border:"none", color: person===key ? val.headerAccent : "rgba(255,255,255,0.4)",
              fontSize:14, fontWeight: person===key ? 700 : 400,
              cursor:"pointer", transition:"all .2s",
            }}>{val.name}</button>
          ))}
        </div>

        {/* Week nav */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
          <button onClick={()=>setWk(w=>Math.max(0,w-1))} disabled={wk===0}
            style={{ background:wk===0?"transparent":p.navBg, border:"none", borderRadius:8,
              padding:"5px 12px", color:wk===0?"rgba(255,255,255,0.2)":p.headerAccent,
              fontSize:20, cursor:wk===0?"default":"pointer", lineHeight:1 }}>‹</button>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", letterSpacing:2, marginBottom:2 }}>
              2026年五月・{p.sub}
            </div>
            <div style={{ fontSize:15, fontWeight:700, color:p.headerAccent, letterSpacing:1 }}>
              {weekCfg.label}
            </div>
          </div>
          <button onClick={()=>setWk(w=>Math.min(WEEKS.length-1,w+1))} disabled={wk===WEEKS.length-1}
            style={{ background:wk===WEEKS.length-1?"transparent":p.navBg, border:"none", borderRadius:8,
              padding:"5px 12px", color:wk===WEEKS.length-1?"rgba(255,255,255,0.2)":p.headerAccent,
              fontSize:20, cursor:wk===WEEKS.length-1?"default":"pointer", lineHeight:1 }}>›</button>
        </div>

        {/* Week dots */}
        <div style={{ display:"flex", justifyContent:"center", gap:6, paddingBottom:10 }}>
          {WEEKS.map((_,i)=>(
            <div key={i} onClick={()=>setWk(i)} style={{ width:wk===i?20:6, height:6, borderRadius:99,
              background:wk===i?p.dotActive:p.dotInactive, cursor:"pointer", transition:"all .2s" }}/>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, padding:"10px 10px 8px", display:"flex",
        flexDirection:"column", gap:8, minHeight:0, overflow:"hidden" }}>
        <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols},1fr)`,
          gap:8, flex:weekCfg.partial?"0 0 auto":3, minHeight:0 }}>
          {gridDays.map(d => <DayCard key={d.date} d={d} isToday={d.date===todayStr} todayColor={p.todayColor}/>)}
        </div>
        <div style={{ flexShrink:0 }}>
          <div style={{ fontSize:10, color:"#a8a29e", marginBottom:4, paddingLeft:2, letterSpacing:1 }}>本週最佳日</div>
          <FeaturedCard d={best}/>
        </div>
        <div style={{ textAlign:"center", fontSize:10, color:"#a8a29e", letterSpacing:1, flexShrink:0 }}>
          五月衝刺，收穫就在不遠處 ✨
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
